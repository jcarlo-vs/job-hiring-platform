name: supabase-keepalive

# Runs a real Postgres query against Supabase (via PostgREST) twice a week so
# the free-tier inactivity pause (~7 days) is reset. The schedule runs Mon & Thu
# to absorb GitHub's best-effort cron delays.
#
# Hits Supabase directly rather than the app's /api/health route so the keepalive
# keeps working even when the Vercel deployment is down or redeployed at a new URL.
# SUPABASE_ANON_KEY is the publishable (anon) key - RLS still governs all access.
#
# Uses NO third-party actions (only preinstalled `curl` + `gh`) so it works
# regardless of the account's Actions policy. The second step reimplements the
# "keepalive commit" inline to stop GitHub auto-disabling this schedule after
# 60 days of repo inactivity.

on:
  schedule:
    - cron: "0 7 * * 1,4" # Mon & Thu 07:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write # for the inactivity keepalive commit

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (runs a real DB query via PostgREST)
        env:
          SUPABASE_URL: https://uuxctnyrynwmnwaeopqw.supabase.co
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          curl --fail-with-body -sS \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/health_check?select=id&limit=1"

      - name: Prevent 60-day scheduled-workflow auto-disable
        if: ${{ github.event_name == 'schedule' }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          last_iso=$(gh api "repos/$REPO/commits/$BRANCH" --jq '.commit.committer.date')
          days=$(( ( $(date +%s) - $(date -d "$last_iso" +%s) ) / 86400 ))
          echo "Days since last commit: $days"
          if [ "$days" -lt 50 ]; then
            echo "Repo active within 50 days; no keepalive commit needed."
            exit 0
          fi
          parent=$(gh api "repos/$REPO/git/refs/heads/$BRANCH" --jq '.object.sha')
          tree=$(gh api "repos/$REPO/git/commits/$parent" --jq '.tree.sha')
          new=$(gh api -X POST "repos/$REPO/git/commits" \
            -f message="chore: keepalive (reset 60-day workflow timer)" \
            -f tree="$tree" -f "parents[]=$parent" --jq '.sha')
          gh api -X PATCH "repos/$REPO/git/refs/heads/$BRANCH" -f sha="$new"
          echo "Created keepalive commit $new"
